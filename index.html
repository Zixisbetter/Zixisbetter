<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zix Is Better</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #0a1f44;
            background: linear-gradient(135deg, #1e3a8a, #f8fafc, #1e3a8a);
            background-size: 200% 200%;
            animation: gentleShift 20s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        @keyframes gentleShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            width: 100%;
            text-align: center;
            padding: 50px 15px 30px;
            background: rgba(30, 58, 138, 0.25);
            backdrop-filter: blur(6px);
        }

        h1 {
            margin: 0;
            font-size: 2.8rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(30, 58, 138, 0.7), 0 0 30px rgba(30, 58, 138, 0.4);
            letter-spacing: 1px;
            animation: softGlow 4s ease-in-out infinite alternate;
        }

        @keyframes softGlow {
            from { text-shadow: 0 0 10px rgba(30, 58, 138, 0.6); }
            to   { text-shadow: 0 0 25px rgba(30, 58, 138, 0.9); }
        }

        main {
            max-width: 1000px;
            width: 92%;
            padding: 20px 15px;
            text-align: center;
            z-index: 1;
        }

        .profile-pic {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            overflow: hidden;
            margin: 35px auto;
            box-shadow: 0 0 40px rgba(30, 58, 138, 0.7);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: #ff0; /* Yellow fallback in case image fails */
        }

        .profile-pic:hover {
            transform: scale(1.08);
            box-shadow: 0 0 60px rgba(30, 58, 138, 1);
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;          /* <-- This makes it FILL the circle */
            object-position: center;    /* Centers the crop */
        }

        .discord {
            font-size: 1.35rem;
            margin: 35px 0;
            padding: 18px 30px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid #60a5fa;
            border-radius: 12px;
            color: #ffffff;
            display: inline-block;
            box-shadow: 0 0 25px rgba(96, 165, 250, 0.4);
            transition: all 0.3s ease;
        }

        .discord:hover {
            box-shadow: 0 0 45px rgba(96, 165, 250, 0.6);
            transform: translateY(-4px);
        }

        .media-section h2 {
            font-size: 1.9rem;
            margin: 50px 0 25px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(30, 58, 138, 0.7);
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 0 auto;
        }

        .media-item {
            overflow: hidden;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
        }

        .media-item:hover {
            transform: scale(1.06);
            box-shadow: 0 12px 40px rgba(30, 58, 138, 0.5);
        }

        .media-item img,
        .media-item video {
            width: 100%;
            display: block;
            transition: transform 0.4s ease;
        }

        .media-item:hover img,
        .media-item:hover video {
            transform: scale(1.1);
        }

        footer {
            margin-top: auto;
            padding: 25px 15px;
            font-size: 0.95rem;
            color: #e0f2fe;
            opacity: 0.85;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
            text-align: center;
        }

        /* RESPONSIVE ADJUSTMENTS */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .profile-pic { width: 220px; height: 220px; margin: 30px auto; }
            .discord { font-size: 1.2rem; padding: 15px 25px; margin: 25px 0; }
            .media-section h2 { font-size: 1.7rem; margin: 40px 0 20px; }
            .media-grid { grid-template-columns: 1fr; gap: 18px; }
            main { padding: 15px 10px; }
            header { padding: 40px 10px 25px; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.9rem; }
            .profile-pic { width: 180px; height: 180px; margin: 25px auto; }
            .discord { font-size: 1.1rem; padding: 12px 20px; }
            footer { font-size: 0.85rem; padding: 20px 10px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>I am better than 99.99% of all players</h1>
    </header>

    <main>

        <!-- Profile Picture: ZIX GAMING logo – fills circle completely -->
        <div class="profile-pic">
            <img src="profile.jpg" alt="ZIX Gaming Logo">
        </div>

        <!-- Discord Info -->
        <div class="discord">
            Main Discord: zix5865<br>
            Alt Discord: Kardistan_
        </div>

        <!-- Custom Pictures / Videos Section -->
        <div class="media-section">
            <h2>My Media</h2>
            <div class="media-grid">
                <!-- Replace src with your uploaded files or direct URLs -->
                <div class="media-item">
                    <img src="image1.jpg" alt="Custom Image 1">
                </div>
                <div class="media-item">
                    <img src="image2.jpg" alt="Custom Image 2">
                </div>
                <div class="media-item">
                    <video controls loop muted>
                        <source src="video1.mp4" type="video/mp4">
                        Your browser does not support video.
                    </video>
                </div>
                <!-- Add more <div class="media-item"> blocks here as needed -->
            </div>
        </div>

    </main>

    <footer>
        Powered by GitHub Pages • © 2026 Zix
    </footer>

</body>
</html>
