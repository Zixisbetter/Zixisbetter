<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zix Is Better</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #e3f2fd; /* Solid light blue */
            color: #0d47a1; /* Dark blue text */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 50px 20px 30px;
            background: #bbdefb; /* Slightly darker blue header */
        }

        h1 {
            margin: 0;
            font-size: 2.6rem;
            font-weight: 700;
            color: #0d47a1;
        }

        main {
            max-width: 960px;
            width: 90%;
            padding: 30px 15px;
            text-align: center;
        }

        .profile-pic {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            overflow: hidden;
            margin: 30px auto 25px;
            box-shadow: 0 6px 20px rgba(13, 71, 161, 0.25);
            background: #ff0;
            clip-path: circle(50% at 50% 50%);
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 10%;
        }

        .discord {
            font-size: 1.3rem;
            margin: 20px 0 30px;
            padding: 16px 30px;
            background: white;
            border: 1px solid #90caf9;
            border-radius: 12px;
            color: #0d47a1;
            display: inline-block;
            box-shadow: 0 4px 12px rgba(13, 71, 161, 0.12);
        }

        .gallery-link {
            display: inline-block;
            margin: 20px 0 40px;
            padding: 12px 30px;
            background: #2196f3;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.15rem;
            font-weight: 500;
            transition: background 0.25s;
        }

        .gallery-link:hover {
            background: #1976d2;
        }

        .teaser-media h2 {
            font-size: 1.7rem;
            margin: 40px 0 20px;
            color: #0d47a1;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .media-item {
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(13, 71, 161, 0.15);
            background: white;
            transition: transform 0.25s, box-shadow 0.25s;
        }

        .media-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 24px rgba(13, 71, 161, 0.22);
        }

        .media-item img,
        .media-item video {
            width: 100%;
            display: block;
        }

        footer {
            margin-top: auto;
            padding: 30px 20px;
            color: #1565c0;
            font-size: 0.95rem;
            text-align: center;
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            h1 { font-size: 2.1rem; }
            .profile-pic { width: 190px; height: 190px; margin: 25px auto 20px; }
            .discord { font-size: 1.2rem; padding: 14px 25px; }
            .gallery-link { padding: 10px 26px; font-size: 1.05rem; }
            .teaser-media h2 { font-size: 1.5rem; }
            main { padding: 20px 12px; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .profile-pic { width: 160px; height: 160px; }
            footer { font-size: 0.9rem; padding: 25px 15px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>I am better than 99.99% of all players</h1>
    </header>

    <main>

        <div class="profile-pic">
            <img src="profile.jpg" alt="ZIX Gaming Logo">
        </div>

        <div class="discord">
            Main Discord: zix5865<br>
            Alt Discord: Kardistan_
        </div>

        <a href="media.html" class="gallery-link">
            View Full Media Gallery →
        </a>

        <div class="teaser-media">
            <h2>Recent Highlights</h2>
            <div class="media-grid">
                <!-- Optional: keep 1–3 items or remove this whole section -->
                <div class="media-item">
                    <img src="highlight1.jpg" alt="Highlight 1">
                </div>
                <div class="media-item">
                    <img src="highlight2.jpg" alt="Highlight 2">
                </div>
            </div>
        </div>

    </main>

    <footer>
        Powered by GitHub Pages • © 2026 Zix
    </footer>

</body>
</html>
